<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onboarding Hub ZA</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0d0f14">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg: #0d0f14;
            --surface: #161a22;
            --border: #2a2f3d;
            --text-main: #e1e1e6;
            --text-dim: #8d8d99;
            --primary: #00c896;
            --blue: #0094ff;
            --orange: #ff7c3e;
            --red: #ff4d6d;
            --whatsapp: #25d366;
            --sidebar-width: 260px;
            --panel-width: 500px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
            user-select: none; /* Prevents accidental text selection on mobile */
        }

        h1, h2, h3, .heading-font { font-family: 'Syne', sans-serif; }

        /* App Layout */
        .app-container { display: flex; min-height: 100vh; }

        /* Sidebar - Hidden on mobile by default */
        aside {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: transform var(--transition);
        }

        /* Main Content */
        main {
            flex: 1;
            margin-left: var(--sidebar-width);
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        header {
            height: 70px;
            background: rgba(13, 15, 20, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 90;
        }

        /* Buttons */
        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #fff; }
        .btn-whatsapp { background: var(--whatsapp); color: #fff; width: 100%; }
        .btn-email { background: var(--blue); color: #fff; width: 100%; }

        .content-body { padding: 20px; width: 100%; }

        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
        }
        .stat-value { font-size: 1.5rem; font-weight: 700; font-family: 'Syne'; color: var(--primary); }

        /* Detail Panel */
        .detail-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
        }
        .detail-panel {
            position: fixed;
            right: -100%;
            top: 0;
            width: var(--panel-width);
            height: 100vh;
            background: var(--surface);
            z-index: 2001;
            transition: right var(--transition);
            display: flex;
            flex-direction: column;
        }
        .detail-panel.active { right: 0; }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 15px;
        }
        .modal {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-body { padding: 24px; }

        /* FICA Block */
        .fica-block {
            border: 1px solid var(--red);
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 77, 109, 0.05);
            font-size: 0.75rem;
            margin: 15px 0;
            color: #ffb3c1;
        }

        /* Stepper */
        .step { display: flex; gap: 12px; margin-bottom: 20px; }
        .step-circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
        .step.completed .step-circle { background: var(--primary); color: #000; border-color: var(--primary); }
        .quote-box { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 6px; font-size: 0.8rem; margin-top: 5px; font-style: italic; }

        /* Toast */
        #toast-container { position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 9999; }
        .toast { background: #fff; color: #000; padding: 16px; border-radius: 8px; margin-top: 8px; font-weight: 600; text-align: center; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            aside { transform: translateX(-100%); }
            aside.mobile-open { transform: translateX(0); }
            main { margin-left: 0; }
            .detail-panel { width: 100%; }
            .sidebar-toggle { display: block; }
        }

        /* Helper Classes */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: #0d0f14; border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div style="padding: 24px; font-weight: 800; color: var(--primary); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
                Onboarding Hub
                <span onclick="toggleSidebar()" style="cursor:pointer">✕</span>
            </div>
            <div style="padding: 10px; flex: 1;">
                <div class="nav-item" onclick="switchView('dashboard'); toggleSidebar()">Dashboard</div>
                <div class="nav-item" onclick="switchView('pipeline'); toggleSidebar()">Pipeline</div>
                <div class="nav-item" onclick="switchView('all'); toggleSidebar()">All Drivers</div>
            </div>
            <div style="padding: 20px; border-top: 1px solid var(--border);">
                <button class="btn btn-outline" style="width:100%" onclick="openModal('settingsModal')">Settings</button>
            </div>
        </aside>

        <main>
            <header>
                <div style="display:flex; align-items:center; gap:12px">
                    <button class="btn btn-outline" onclick="toggleSidebar()" style="padding:8px">☰</button>
                    <h3 id="view-title">Dashboard</h3>
                </div>
                <button class="btn btn-primary" onclick="openModal('addDriverModal')">+</button>
            </header>

            <div class="content-body" id="main-content"></div>
        </main>
    </div>

    <!-- Modals & Detail Panel (Reused from previous version) -->
    <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
    <div class="detail-panel" id="detailPanel">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <h3 id="panelName"></h3>
            <button onclick="closeDetail()" style="background:none; border:none; color:#fff; font-size:24px;">✕</button>
        </div>
        <div id="panelBody" style="padding:20px; flex:1; overflow-y:auto;"></div>
        <div id="panelFooter" style="padding:20px; border-top:1px solid var(--border); display:flex; gap:10px;"></div>
    </div>

    <!-- Modal: Add Driver -->
    <div class="modal-overlay" id="addDriverModal">
        <div class="modal">
            <div class="modal-body">
                <h3 style="margin-bottom:20px">New Driver</h3>
                <form id="driverForm">
                    <div class="form-group"><label>Full Name</label><input type="text" id="df-name" required></div>
                    <div class="form-group"><label>SA ID Number</label><input type="number" id="df-id" required></div>
                    <div class="form-group"><label>WhatsApp Number</label><input type="tel" id="df-wa" placeholder="0821234567" required></div>
                    <div class="form-group"><label>Email Address</label><input type="email" id="df-email" required></div>
                    <div class="form-group">
                        <label>Vehicle</label>
                        <select id="df-vehicle"><option>Motorbike</option><option>Car</option></select>
                    </div>
                    
                    <div class="fica-block">
                        I confirm all info is true and accurate per SA FICA standards. Providing false info is a criminal offense.
                    </div>
                    <label style="display:flex; gap:10px; font-size:0.8rem; margin-bottom:20px">
                        <input type="checkbox" id="ficaCheck" onchange="document.getElementById('submitBtn').disabled = !this.checked"> 
                        I agree to the FICA declaration.
                    </label>

                    <div style="display:flex; gap:10px">
                        <button type="button" class="btn btn-outline" style="flex:1" onclick="closeModal('addDriverModal')">Cancel</button>
                        <button type="submit" id="submitBtn" class="btn btn-primary" style="flex:1" disabled>Assign</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal: Settings -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-body">
                <h3 style="margin-bottom:20px">EmailJS Setup</h3>
                <div class="form-group"><label>Public Key</label><input type="text" id="set-pk"></div>
                <div class="form-group"><label>Service ID</label><input type="text" id="set-sid"></div>
                <div class="form-group"><label>Template ID</label><input type="text" id="set-tid"></div>
                <button class="btn btn-primary" style="width:100%" onclick="saveSettings()">Save</button>
                <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="closeModal('settingsModal')">Close</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // --- PWA Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(() => {
                    console.log('Service Worker Registered');
                });
            });
        }

        // --- Logic ---
        const STAGES = [
            { name: "Identity", color: "#ff4d6d", msg: "Verifying your documents." },
            { name: "Screening", color: "#ff7c3e", msg: "Please complete fingerprint check." },
            { name: "Gear", color: "#f5c842", msg: "Authorized to buy delivery bag." },
            { name: "Review", color: "#0094ff", msg: "Activating your profile." },
            { name: "Active", color: "#00c896", msg: "Account is ACTIVE!" }
        ];

        let drivers = JSON.parse(localStorage.getItem('ob_drivers_za')) || [];
        let settings = JSON.parse(localStorage.getItem('ob_settings_za')) || { pk: '', sid: '', tid: '' };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('mobile-open'); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showToast(msg) {
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        document.getElementById('driverForm').onsubmit = (e) => {
            e.preventDefault();
            const d = {
                id: Date.now(),
                name: document.getElementById('df-name').value,
                idNum: document.getElementById('df-id').value,
                whatsapp: document.getElementById('df-wa').value,
                email: document.getElementById('df-email').value,
                vehicle: document.getElementById('df-vehicle').value,
                stage: 0,
                completed: false,
                comments: []
            };
            drivers.push(d);
            localStorage.setItem('ob_drivers_za', JSON.stringify(drivers));
            closeModal('addDriverModal');
            showToast("Driver Added");
            switchView('dashboard');
        };

        function switchView(view) {
            const container = document.getElementById('main-content');
            document.getElementById('view-title').innerText = view.toUpperCase();
            
            if(view === 'dashboard') {
                const active = drivers.filter(x => !x.completed).length;
                container.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-value">${active}</div><div style="font-size:0.7rem">Active</div></div>
                        <div class="stat-card"><div class="stat-value">${drivers.length - active}</div><div style="font-size:0.7rem">Completed</div></div>
                    </div>
                    <h4>Recent Drivers</h4>
                    <div id="list-target"></div>
                `;
                renderList(drivers.slice(-10), document.getElementById('list-target'));
            } else {
                container.innerHTML = `<div id="list-target"></div>`;
                renderList(drivers, document.getElementById('list-target'));
            }
        }

        function renderList(arr, target) {
            target.innerHTML = arr.map(d => `
                <div onclick="openDetail(${d.id})" style="background:var(--surface); padding:15px; border-radius:10px; margin-top:10px; border-left:4px solid ${STAGES[d.stage].color}">
                    <div style="font-weight:700">${d.name}</div>
                    <div style="font-size:0.8rem; color:var(--text-dim)">${STAGES[d.stage].name} • ${d.vehicle}</div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const d = drivers.find(x => x.id === id);
            document.getElementById('panelName').innerText = d.name;
            const body = document.getElementById('panelBody');
            
            body.innerHTML = `
                <div style="margin-bottom:20px; font-size:0.9rem">
                    <div><b>ID:</b> ${d.idNum}</div>
                    <div><b>WA:</b> ${d.whatsapp}</div>
                </div>
                ${STAGES.map((s, i) => `
                    <div class="step ${i <= d.stage ? 'completed' : ''}">
                        <div class="step-circle">${i < d.stage ? '✓' : i+1}</div>
                        <div>
                            <div style="font-weight:700">${s.name}</div>
                            ${i === d.stage ? `<div class="quote-box">${s.msg}</div>` : ''}
                        </div>
                    </div>
                `).join('')}
                <button class="btn btn-whatsapp" onclick="sendWA('${d.whatsapp}', '${d.name}', ${d.stage})">Send WhatsApp</button>
            `;

            document.getElementById('panelFooter').innerHTML = `
                <button class="btn btn-primary" style="flex:1" onclick="advance(${d.id})">Next Stage</button>
            `;
            
            document.getElementById('detailOverlay').style.display = 'block';
            document.getElementById('detailPanel').classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailOverlay').style.display = 'none';
            document.getElementById('detailPanel').classList.remove('active');
        }

        function advance(id) {
            const i = drivers.findIndex(x => x.id === id);
            if(drivers[i].stage < 4) drivers[i].stage++;
            else drivers[i].completed = true;
            localStorage.setItem('ob_drivers_za', JSON.stringify(drivers));
            closeDetail();
            switchView('dashboard');
            showToast("Stage Updated");
        }

        function sendWA(num, name, stage) {
            const cleanNum = num.startsWith('0') ? '27' + num.substring(1) : num;
            const msg = encodeURIComponent(`Hi ${name}, ${STAGES[stage].msg}`);
            window.open(`https://wa.me/${cleanNum}?text=${msg}`);
        }

        function saveSettings() {
            settings = { pk: document.getElementById('set-pk').value, sid: document.getElementById('set-sid').value, tid: document.getElementById('set-tid').value };
            localStorage.setItem('ob_settings_za', JSON.stringify(settings));
            showToast("Settings Saved");
            closeModal('settingsModal');
        }

        switchView('dashboard');
    </script>
</body>
</html>
