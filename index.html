<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onboarding Hub ZA</title>
    
    <meta name="theme-color" content="#0d0f14">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0d0f14; --surface: #161a22; --border: #2a2f3d;
            --text: #ffffff; --dim: #a1a1aa;
            --primary: #00c896; --blue: #0094ff; --orange: #ff7c3e;
            --red: #ff4d6d; --yellow: #f5c842; --whatsapp: #25d366;
            --sidebar-w: 260px;
        }

        body.theme-midnight { --bg: #000000; --surface: #0a0a0a; --border: #1a1a1a; }
        body.theme-navy { --bg: #020617; --surface: #0f172a; --border: #1e293b; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-brand { padding: 25px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .sidebar-brand img, .fallback-logo { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; background: var(--bg); }

        .nav-item { padding: 14px 20px; cursor: pointer; color: var(--dim); border-radius: 12px; margin: 4px 12px; font-weight: 500; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 700; }

        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #topbar { height: 70px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        
        .view { padding: 20px; flex: 1; overflow-y: auto; display: none; }
        .view.active { display: block; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 18px; border-radius: 18px; }
        .stat-card h4 { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; margin-bottom: 5px; }
        .stat-card .val { font-size: 1.4rem; font-weight: 800; font-family: 'Syne'; color: var(--primary); }

        .card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .driver-img-sm { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); background: #000; }

        #panel { position: fixed; top: 0; right: -100%; width: 500px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 5000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; box-shadow: -20px 0 50px rgba(0,0,0,0.5); }
        #panel.open { right: 0; }
        .panel-content { padding: 25px; overflow-y: auto; flex: 1; }
        .panel-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--surface); }

        .form-control { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff; border-radius: 12px; margin-bottom: 12px; font-family: inherit; font-size: 1rem; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-whatsapp { background: var(--whatsapp); color: #fff; width: 100%; margin-top: 15px; }

        .pipe-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; }
        .pipe-col { min-width: 280px; background: rgba(255,255,255,0.02); border-radius: 20px; padding: 20px; height: fit-content; border: 1px solid var(--border); }

        @media (max-width: 850px) {
            #sidebar { position: fixed; height: 100vh; transform: translateX(-100%); }
            #sidebar.mobile-open { transform: translateX(0); }
            #panel { width: 100%; }
            .mobile-btn { display: block !important; }
        }
    </style>
</head>
<body class="theme-default">

    <div id="sidebar">
        <div class="sidebar-brand" onclick="switchView('dashboard')">
            <img src="logo.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1162/1162456.png'">
            <h2 style="font-family:'Syne'; font-size:1.1rem; color:var(--primary)">HUB ZA</h2>
        </div>
        <div style="padding-top: 15px; flex: 1;">
            <div id="nav-dashboard" class="nav-item active" onclick="switchView('dashboard')">📈 Dashboard</div>
            <div id="nav-pipeline" class="nav-item" onclick="switchView('pipeline')">📋 Pipeline</div>
            <div id="nav-revenue" class="nav-item" onclick="switchView('revenue')">💰 Revenue</div>
            <div id="nav-tasks" class="nav-item" onclick="switchView('tasks')">✅ Delegation</div>
            <div id="nav-all" class="nav-item" onclick="switchView('all')">👥 All Drivers</div>
            <div id="nav-settings" class="nav-item" onclick="switchView('settings')">⚙️ Settings</div>
        </div>
    </div>

    <div id="main">
        <div id="topbar">
            <button class="btn mobile-btn" style="display:none; background:transparent; color:#fff; font-size:24px;" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">☰</button>
            <h3 id="view-title" style="font-family:'Syne'">DASHBOARD</h3>
            <button class="btn btn-primary" onclick="openModal('modal-add')">Assign +</button>
        </div>

        <div id="view-dashboard" class="view active">
            <div class="stat-grid">
                <div class="stat-card"><h4>ACTIVE</h4><div class="val" id="stat-active">0</div></div>
                <div class="stat-card"><h4>SALES</h4><div class="val" id="stat-rev">R0</div></div>
            </div>
            <div id="recent-list"></div>
        </div>

        <div id="view-revenue" class="view">
            <div class="stat-card" style="margin-bottom:20px; text-align:center;">
                <h4>Total Revenue</h4>
                <div class="val" id="rev-total-big" style="font-size:2.5rem;">R0</div>
            </div>
            <div id="revenue-log"></div>
        </div>

        <div id="view-tasks" class="view">
            <div style="background:var(--surface); padding:20px; border-radius:18px; border:1px solid var(--border); margin-bottom:20px;">
                <input type="text" id="t-text" class="form-control" placeholder="Task...">
                <input type="text" id="t-assignee" class="form-control" placeholder="Assignee...">
                <button class="btn btn-primary" style="width:100%" onclick="addTask()">Delegate</button>
            </div>
            <div id="task-list"></div>
        </div>

        <div id="view-pipeline" class="view"><div class="pipe-row" id="pipe-area"></div></div>
        <div id="view-all" class="view"><div id="all-list"></div></div>
        <div id="view-settings" class="view">
            <h4 style="margin-bottom:20px;">Theme</h4>
            <select class="form-control" onchange="document.body.className = this.value">
                <option value="theme-default">Dark</option>
                <option value="theme-midnight">OLED</option>
                <option value="theme-navy">Navy</option>
            </select>
            <button class="btn btn-danger" style="width:100%; margin-top:20px;" onclick="localStorage.clear(); location.reload();">⚠️ Reset App Data</button>
        </div>
    </div>

    <div id="panel">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <h3 id="panel-title">Detail</h3>
            <button onclick="closePanel()" style="background:none; border:none; color:#fff; font-size:28px;">✕</button>
        </div>
        <div class="panel-content" id="panel-content"></div>
        <div id="panel-footer" class="panel-footer"></div>
    </div>

    <div id="modal-add" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9000; display:none; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--surface); width:100%; max-width:500px; border-radius:24px; padding:30px; border:1px solid var(--border); max-height:92vh; overflow-y:auto;">
            <h3>New Driver</h3>
            <div style="display:flex; flex-direction:column; align-items:center; margin:20px 0;">
                <img id="img-preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid var(--primary);">
                <input type="file" id="in-photo" accept="image/*" style="display:none;" onchange="handlePhoto(this)">
                <button class="btn" style="font-size:0.7rem; color:var(--primary)" onclick="document.getElementById('in-photo').click()">📸 Upload Photo</button>
            </div>
            <input type="text" id="in-name" class="form-control" placeholder="Full Name">
            <input type="tel" id="in-wa" class="form-control" placeholder="WhatsApp">
            <select id="in-deal" class="form-control"><option value="4000">Rent-to-Own (R4,000)</option><option value="2500">Cash Deal (R2,500)</option></select>
            <div style="font-size:0.7rem; color:var(--dim); background:#000; padding:10px; border-radius:10px; margin-bottom:15px;">By continuing you agree to Waardeer Holdings Terms.</div>
            <label style="display:flex; gap:10px; font-size:0.8rem; margin-bottom:20px;"><input type="checkbox" id="in-fica" onchange="document.getElementById('btn-save').disabled = !this.checked"> I Agree</label>
            <div style="display:flex; gap:10px;"><button class="btn" style="flex:1; border:1px solid var(--border); color:#fff;" onclick="closeModal('modal-add')">Cancel</button><button class="btn btn-primary" id="btn-save" style="flex:1" disabled onclick="saveDriver()">Assign</button></div>
        </div>
    </div>

    <div id="toasts" style="position:fixed; bottom:20px; right:20px; z-index:9999;"></div>

    <script>
        const STAGES = [
            { name: "Photo Approved", color: "#ff4d6d", msg: "Hi [Name], profile photo accepted! Let's go! 🚀" },
            { name: "Fingerprints", color: "#ff7c3e", msg: "Hi [Name], reserve R350 for fingerprints at Postnet. 🔒" },
            { name: "Bag Purchase", color: "#f5c842", msg: "Hi [Name], pay R800 for bag to FNB: 63094968030. 🎒" },
            { name: "Final Review", color: "#0094ff", msg: "Hi [Name], activating your profile now. ⚙️" },
            { name: "Account Active", color: "#00c896", msg: "Hi [Name], Account is ACTIVE! 🎉" }
        ];

        let drivers = JSON.parse(localStorage.getItem('oh_v14_drivers')) || [];
        let tasks = JSON.parse(localStorage.getItem('oh_v14_tasks')) || [];
        let currentImg = null; let activeId = null;

        function save() { localStorage.setItem('oh_v14_drivers', JSON.stringify(drivers)); localStorage.setItem('oh_v14_tasks', JSON.stringify(tasks)); }
        
        function handlePhoto(input) {
            const reader = new FileReader();
            reader.onload = (e) => { currentImg = e.target.result; document.getElementById('img-preview').src = currentImg; };
            reader.readAsDataURL(input.files[0]);
        }

        function switchView(v) {
            document.querySelectorAll('.view').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            try {
                document.getElementById(`view-${v}`).classList.add('active');
                document.getElementById(`nav-${v}`).classList.add('active');
                document.getElementById('view-title').innerText = v.toUpperCase();
            } catch(e) {}
            document.getElementById('sidebar').classList.remove('mobile-open');
            refresh();
        }

        function saveDriver() {
            const n = document.getElementById('in-name').value;
            const w = document.getElementById('in-wa').value;
            if(!n || !w) return;
            drivers.push({ id: Date.now(), name: n, wa: w, rev: parseInt(document.getElementById('in-deal').value), photo: currentImg, stage: 0, done: false });
            save(); closeModal('modal-add'); currentImg=null; refresh();
        }

        function addTask() {
            const n = document.getElementById('t-text').value; const w = document.getElementById('t-assignee').value;
            if(!n || !w) return;
            tasks.push({ id: Date.now(), name: n, who: w, logs: [new Date().toLocaleString() + ": Started"] });
            save(); document.getElementById('t-text').value=''; document.getElementById('t-assignee').value=''; refresh();
        }

        function openDriverPanel(id) {
            activeId = id; const d = drivers.find(x => x.id === activeId);
            document.getElementById('panel-title').innerText = "Driver Profile";
            document.getElementById('panel-content').innerHTML = `
                <div style="display:flex; gap:15px; align-items:center; margin-bottom:20px;">
                    <img src="${d.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="driver-img-sm" style="width:60px; height:60px;">
                    <div><h3>${d.name}</h3><span style="color:var(--primary); font-weight:800; font-size:0.8rem;">R${d.rev}</span></div>
                </div>
                ${STAGES.map((s,i) => `<div style="padding:12px; border-radius:10px; margin-bottom:8px; background:${i <= d.stage ? 'var(--border)' : 'transparent'}; opacity:${i <= d.stage ? '1' : '0.3'}">${i+1}. ${s.name}</div>`).join('')}
                <button class="btn btn-whatsapp" onclick="sendWA()">Send WhatsApp</button>
                <button class="btn" style="width:100%; border:1px solid var(--red); color:var(--red); margin-top:20px;" onclick="deleteDriver(${d.id})">Delete Profile</button>
            `;
            document.getElementById('panel-footer').innerHTML = `
                <button class="btn" style="flex:1; border:1px solid var(--border); color:#fff" onclick="changeStage(-1)">Back</button>
                <button class="btn" style="flex:1; background:var(--blue); color:#fff" onclick="changeStage(1)">Next</button>
                <button class="btn btn-primary" style="flex:1" onclick="markDone()">Complete</button>
            `;
            document.getElementById('panel').classList.add('open');
        }

        function changeStage(dir) { const d = drivers.find(x => x.id === activeId); let n = d.stage + dir; if(n >= 0 && n < STAGES.length) { d.stage = n; save(); openDriverPanel(activeId); refresh(); } }
        function sendWA() { const d = drivers.find(x => x.id === activeId); let num = d.wa.replace(/\s+/g, ''); if(num.startsWith('0')) num = '27' + num.substring(1); const msg = encodeURIComponent(STAGES[d.stage].msg.replace("[Name]", d.name) + "\n\nOnboardingHub ZA"); window.open(`https://wa.me/${num}?text=${msg}`, '_blank'); }
        function markDone() { const d = drivers.find(x => x.id === activeId); d.done = true; save(); closePanel(); refresh(); }
        function deleteDriver(id) { if(confirm("Delete?")) { drivers = drivers.filter(x=>x.id!==id); save(); closePanel(); refresh(); } }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function closePanel() { document.getElementById('panel').classList.remove('open'); }

        function refresh() {
            const active = drivers.filter(d => !d.done).length;
            const rev = drivers.reduce((a, b) => a + b.rev, 0);
            document.getElementById('stat-active').innerText = active;
            document.getElementById('stat-rev').innerText = "R" + rev.toLocaleString();
            
            if(document.getElementById('view-revenue').classList.contains('active')) {
                document.getElementById('rev-total-big').innerText = "R" + rev.toLocaleString();
                document.getElementById('revenue-log').innerHTML = drivers.map(d => `<div class="card"><b>${d.name}</b><span style="margin-left:auto; color:var(--primary)">R${d.rev}</span></div>`).join('');
            }
            document.getElementById('recent-list').innerHTML = drivers.slice(-10).reverse().map(d => `<div class="card" onclick="openDriverPanel(${d.id})"><img src="${d.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="driver-img-sm"><div style="flex:1"><b>${d.name}</b><br><small style="color:var(--dim)">${STAGES[d.stage].name}</small></div></div>`).join('');
            document.getElementById('task-list').innerHTML = tasks.map(t => `<div class="card"><div><b>${t.name}</b><br><small style="color:var(--primary)">${t.who}</small></div></div>`).join('');
            document.getElementById('pipe-area').innerHTML = STAGES.map((s,i) => `<div class="pipe-col"><div style="color:${s.color}; font-weight:800; margin-bottom:10px;">${s.name}</div>${drivers.filter(d => d.stage === i && !d.done).map(d => `<div class="card" style="padding:10px; font-size:0.8rem;" onclick="openDriverPanel(${d.id})">${d.name}</div>`).join('')}</div>`).join('');
            document.getElementById('all-list').innerHTML = drivers.map(d => `<div class="card" onclick="openDriverPanel(${d.id})">${d.name} • ${d.done ? 'Done' : STAGES[d.stage].name}</div>`).join('');
        }
        
        window.onload = refresh;
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js')); }
    </script>
</body>
  </html>
