    <style>
        :root {
            --bg: #0d0f14; --surface: #161a22; --border: #2a2f3d;
            --text: #ffffff; --dim: #94a3b8;
            --primary: #00c896; --blue: #0094ff; --orange: #ff7c3e;
            --red: #ff4d6d; --whatsapp: #25d366;
            --sidebar-w: 280px;
            --transit: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.theme-white { --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0; --text: #0f172a; --dim: #64748b; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; display: none; backdrop-filter: blur(4px); }
        #sidebar-overlay.active { display: block; }
        #sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; transition: var(--transit); position: relative; }
        .sidebar-brand { padding: 30px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .sidebar-brand img { width: 45px; height: 45px; border-radius: 50%; border: 2.5px solid var(--primary); object-fit: cover; }
        .nav-item { padding: 14px 20px; cursor: pointer; color: var(--dim); border-radius: 14px; margin: 4px 14px; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 800; box-shadow: 0 4px 15px rgba(0, 200, 150, 0.2); }

        /* MAIN CONTENT */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #topbar { height: 75px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .view { padding: 25px; flex: 1; overflow-y: auto; display: none; animation: slideUp 0.4s ease; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* DASHBOARD CARDS */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 22px; border-radius: 24px; }
        .stat-card h4 { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; }
        .stat-card .val { font-size: 1.6rem; font-weight: 800; color: var(--primary); font-family: 'Syne'; }
        
        .card { background: var(--surface); border: 1px solid var(--border); padding: 18px; border-radius: 20px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: var(--transit); }
        .card:hover { border-color: var(--primary); transform: translateX(5px); }
        .driver-img-sm { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2.5px solid var(--border); background: #000; }

        /* INPUTS & BUTTONS */
        .form-control { width: 100%; padding: 16px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; border-radius: 14px; margin-bottom: 12px; font-family: inherit; font-size: 1rem; outline: none; }
        .btn { padding: 14px 22px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; transition: 0.2s; font-size: 0.95rem; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
        .btn-whatsapp { background: var(--whatsapp); color: #fff; width: 100%; margin-top: 15px; }
        .btn-danger { background: rgba(255, 77, 109, 0.1); color: var(--red); border: 1px solid var(--red); width: 100%; margin-top: 40px; }

        /* PANEL */
        #panel { position: fixed; top: 0; right: -100%; width: 500px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 5000; transition: var(--transit); display: flex; flex-direction: column; }
        #panel.open { right: 0; }
        .panel-content { padding: 30px; overflow-y: auto; flex: 1; }
        .panel-footer { padding: 25px; border-top: 1px solid var(--border); display: flex; gap: 12px; background: var(--surface); }

        /* INVOICE DESIGN (Exact Match to Screenshot) */
        .invoice-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .invoice-paper { background: #ffffff; color: #000000; width: 100%; max-width: 650px; padding: 45px; border-radius: 2px; font-size: 14px; line-height: 1.4; position: relative; }
        .inv-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .inv-main-title { color: #00c896; font-size: 3rem; font-weight: 800; font-family: 'Syne'; margin: 0; text-transform: uppercase; line-height: 1; letter-spacing: 2px; }
        .inv-table { width: 100%; border-collapse: collapse; margin: 30px 0; border-top: 1px solid #eee; }
        .inv-table th { text-align: left; padding: 12px 0; font-weight: 700; border-bottom: 1px solid #eee; text-transform: uppercase; font-size: 11px; color: #333; }
        .inv-table td { padding: 15px 0; border-bottom: 1px solid #f5f5f5; }
        .payment-box { margin-top: 40px; border-left: 5px solid #00c896; background: #fafafa; padding: 20px 25px; border-radius: 4px; }

        .terms-box { background: #000; border: 1px solid var(--border); padding: 18px; border-radius: 16px; height: 200px; overflow-y: auto; font-size: 0.8rem; color: var(--dim); line-height: 1.7; margin-bottom: 20px; }
        .rev-val.hidden { filter: blur(12px); pointer-events: none; }
