<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onboarding Hub ZA</title>
    
    <meta name="theme-color" content="#0d0f14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0d0f14; --surface: #161a22; --border: #2a2f3d;
            --text: #ffffff; --dim: #8a94a6;
            --primary: #00c896; --blue: #0094ff; --orange: #ff7c3e;
            --red: #ff4d6d; --yellow: #f5c842; --whatsapp: #25d366;
            --sidebar-w: 260px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .login-card { background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-brand { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .nav-item { padding: 12px 20px; cursor: pointer; color: var(--dim); border-radius: 8px; margin: 4px 10px; font-weight: 500; }
        .nav-item.active { background: var(--border); color: #fff; border-left: 3px solid var(--primary); }

        /* CONTENT */
        #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #topbar { height: 64px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .view { padding: 20px; flex: 1; overflow-y: auto; display: none; }
        .view.active { display: block; }

        /* CARDS & BUTTONS */
        .task-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--dim); cursor: pointer; }
        .task-check.done { background: var(--primary); border-color: var(--primary); }
        .btn { padding: 12px 18px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-whatsapp { background: var(--whatsapp); color: #fff; width: 100%; margin: 15px 0; }
        .btn-danger { background: rgba(255, 77, 109, 0.1); color: var(--red); border: 1px solid var(--red); width: 100%; margin-top: 20px; }

        /* PANEL */
        #panel { position: fixed; top: 0; right: -100%; width: 500px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); z-index: 2000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
        #panel.open { right: 0; }
        .panel-content { padding: 25px; overflow-y: auto; flex: 1; }

        .form-control { width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 10px; margin-bottom: 15px; font-family: inherit; }

        @media (max-width: 850px) {
            #sidebar { position: fixed; height: 100vh; transform: translateX(-100%); }
            #sidebar.mobile-open { transform: translateX(0); }
            #panel { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <img src="logo.png" style="width:120px; height:120px; border-radius:50%; margin-bottom:20px; border:2px solid var(--primary);">
            <h2 style="font-family:'Syne';">ONBOARDING HUB</h2>
            <p style="color:var(--dim); font-size:0.7rem; margin-bottom:25px; letter-spacing:1px;">WAARDEER HOLDINGS</p>
            <input type="password" id="pass-input" class="form-control" placeholder="Enter Password" style="text-align:center;">
            <button class="btn btn-primary" style="width:100%;" onclick="handleAuth()">Access System</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-brand">
            <img src="logo.png" style="width:35px; height:35px; border-radius:50%;">
            <h2 style="font-family:'Syne'; font-size:1rem;">HUB ZA</h2>
        </div>
        <div style="padding-top: 15px; flex: 1;">
            <div id="nav-dashboard" class="nav-item active" onclick="switchView('dashboard')">📈 Dashboard</div>
            <div id="nav-pipeline" class="nav-item" onclick="switchView('pipeline')">📋 Pipeline Board</div>
            <div id="nav-tasks" class="nav-item" onclick="switchView('tasks')">✅ Ops Delegation</div>
            <div id="nav-all" class="nav-item" onclick="switchView('all')">👥 Driver Index</div>
        </div>
        <div style="padding: 20px; border-top: 1px solid var(--border);">
            <button class="btn" style="width:100%; background:transparent; border:1px solid var(--border); color:#fff; font-size:0.7rem;" onclick="location.reload()">🔒 Lock App</button>
        </div>
    </div>

    <div id="main">
        <div id="topbar">
            <button class="btn" style="background:transparent; color:#fff; font-size:24px;" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">☰</button>
            <h3 id="view-title">Dashboard</h3>
            <button class="btn btn-primary" onclick="openModal('modal-add')">Assign +</button>
        </div>

        <div id="view-dashboard" class="view active">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:25px;">
                <div style="background:var(--surface); padding:20px; border-radius:15px; border:1px solid var(--border);">
                    <h4 style="color:var(--dim); font-size:0.7rem;">ACTIVE FLEET</h4>
                    <div id="stat-active" style="font-size:2rem; font-weight:800; font-family:'Syne'">0</div>
                </div>
                <div style="background:var(--surface); padding:20px; border-radius:15px; border:1px solid var(--border);">
                    <h4 style="color:var(--dim); font-size:0.7rem;">OPEN TASKS</h4>
                    <div id="stat-tasks" style="font-size:2rem; font-weight:800; font-family:'Syne'">0</div>
                </div>
            </div>
            <h4 style="margin-bottom:15px; font-family:'Syne'">Recent Drivers</h4>
            <div id="recent-list"></div>
        </div>

        <div id="view-tasks" class="view">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="task-input" class="form-control" placeholder="New task..." style="margin-bottom:0;">
                <button class="btn btn-primary" onclick="addTask()">Add</button>
            </div>
            <div id="task-list"></div>
        </div>

        <div id="view-pipeline" class="view"><div style="display:flex; gap:15px; overflow-x:auto;" id="pipe-area"></div></div>
        <div id="view-all" class="view"><div id="all-list"></div></div>
    </div>

    <div id="panel">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <h3 id="panel-title" style="font-family:'Syne'">Detail</h3>
            <button onclick="closePanel()" style="background:none; border:none; color:#fff; font-size:28px;">✕</button>
        </div>
        <div class="panel-content" id="panel-content"></div>
        <div id="panel-footer" style="padding:20px; border-top:1px solid var(--border); display:flex; gap:10px; background:var(--surface);"></div>
    </div>

    <div id="modal-add" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; display:none; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--surface); width:100%; max-width:500px; border-radius:24px; padding:30px; border:1px solid var(--border); max-height:90vh; overflow-y:auto;">
            <h3 style="margin-bottom:20px; font-family:'Syne'">New Driver Onboarding</h3>
            <input type="text" id="in-name" class="form-control" placeholder="Full Name">
            <input type="tel" id="in-wa" class="form-control" placeholder="WhatsApp Number">
            <input type="number" id="in-id" class="form-control" placeholder="SA ID Number">
            <select id="in-veh" class="form-control"><option>Motorbike</option><option>Car</option></select>
            <div style="border:1px solid var(--red); background:rgba(255, 77, 109, 0.05); padding:12px; border-radius:8px; font-size:0.75rem; color:#ffcbd4; margin-bottom:15px;">I confirm all info is true per SA FICA standards.</div>
            <label style="display:flex; gap:12px; font-size:0.85rem; margin-bottom:25px; align-items:center;"><input type="checkbox" id="in-fica" onchange="document.getElementById('btn-save').disabled = !this.checked"> Agree to FICA</label>
            <div style="display:flex; gap:10px;"><button class="btn" style="flex:1; background:transparent; border:1px solid var(--border); color:#fff;" onclick="closeModal('modal-add')">Cancel</button><button class="btn btn-primary" id="btn-save" style="flex:1" disabled onclick="saveDriver()">Assign</button></div>
        </div>
    </div>

    <div id="toasts" style="position:fixed; bottom:20px; right:20px; z-index:9999;"></div>

    <script>
        // Auth
        let masterPass = localStorage.getItem('oh_za_master_v8');
        if(!masterPass) { document.getElementById('login-btn').innerText = "Set Password & Access"; }

        function handleAuth() {
            const val = document.getElementById('pass-input').value;
            if(!masterPass) {
                if(val.length < 4) return alert("Min 4 characters");
                localStorage.setItem('oh_za_master_v8', val); masterPass = val;
                document.getElementById('login-screen').style.display = 'none'; refresh();
            } else {
                if(val === masterPass) { document.getElementById('login-screen').style.display = 'none'; refresh(); }
                else alert("Wrong Password");
            }
        }

        const STAGES = [
            { name: "Profile Photo Approved", color: "#ff4d6d", msg: "Hi [Name], great news!\n\nYour Uber profile photo has been successfully uploaded and accepted. Let’s get you on the road! 🚀" },
            { name: "Fingerprint Check", color: "#ff7c3e", msg: "Hi [Name], your profile is shaping up perfectly!\n\nPlease reserve R350 to pay at Postnet/HURU and complete your fingerprint check next so we can clear the final security steps. 🔒" },
            { name: "Delivery Bag Authorization", color: "#f5c842", msg: "Hi [Name], you are officially authorized!\n\nPlease pay R800 for your bag purchase to our FNB Account: 63094968030 (Waardeer Holdings). Once paid, grab your gear and let's get ready for your first trip. 🎒" },
            { name: "Profile Activation", color: "#0094ff", msg: "Hi [Name], hang tight!\n\nWe are now activating your profile on the system and getting everything ready for you to roll. ⚙️" },
            { name: "Account Active", color: "#00c896", msg: "Hi [Name], congratulations!\n\nYour account is officially ACTIVE! Time to go online, accept trips, and start earning. Drive safely out there! 🎉" }
        ];

        let drivers = JSON.parse(localStorage.getItem('oh_za_drivers_v8')) || [];
        let tasks = JSON.parse(localStorage.getItem('oh_za_tasks_v8')) || [];
        let activeId = null;

        function save() { localStorage.setItem('oh_za_drivers_v8', JSON.stringify(drivers)); localStorage.setItem('oh_za_tasks_v8', JSON.stringify(tasks)); }
        function toast(m) {
            const t = document.createElement('div'); t.style.background='#fff'; t.style.color='#000'; t.style.padding='15px 20px'; t.style.borderRadius='10px'; t.style.marginTop='10px'; t.style.fontWeight='700'; t.innerText=m;
            document.getElementById('toasts').appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        function switchView(v) {
            document.querySelectorAll('.view').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.getElementById(`nav-${v}`).classList.add('active');
            document.getElementById('view-title').innerText = v.toUpperCase();
            document.getElementById('sidebar').classList.remove('mobile-open');
            refresh();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function saveDriver() {
            const d = { id: Date.now(), name: document.getElementById('in-name').value, whatsapp: document.getElementById('in-wa').value, idNum: document.getElementById('in-id').value, veh: document.getElementById('in-veh').value, stage: 0, done: false };
            drivers.push(d); save(); closeModal('modal-add'); refresh(); toast("Driver Assigned!");
        }

        function addTask() {
            const input = document.getElementById('task-input'); if(!input.value) return;
            tasks.push({ id: Date.now(), text: input.value, done: false });
            input.value = ''; save(); refresh(); toast("Task Added");
        }

        function openDriverDetail(id) {
            activeId = id; const d = drivers.find(x => x.id === id);
            document.getElementById('panel-title').innerText = "Profile";
            document.getElementById('panel-content').innerHTML = `
                <div style="background:var(--border); padding:15px; border-radius:12px; margin-bottom:20px; line-height:1.6;">
                    <b>Name:</b> ${d.name}<br><b>WhatsApp:</b> ${d.whatsapp}<br><b>ID:</b> ${d.idNum}
                </div>
                ${STAGES.map((s,i) => `
                    <div style="display:flex; gap:12px; margin-bottom:12px; opacity:${i <= d.stage ? '1' : '0.2'}">
                        <div style="width:24px; height:24px; border-radius:50%; background:${i <= d.stage ? s.color : 'transparent'}; border:2px solid ${s.color}; display:flex; align-items:center; justify-content:center; color:${i <= d.stage ? '#000' : s.color}; font-weight:800; font-size:10px;">${i < d.stage ? '✓' : i+1}</div>
                        <div style="color:${i === d.stage ? s.color : '#fff'}; font-weight:700;">${s.name}</div>
                    </div>
                `).join('')}
                <button class="btn btn-whatsapp" onclick="sendWA()">Open WhatsApp Now</button>
                <button class="btn btn-danger" onclick="delDriver()">Delete Profile</button>
            `;
            document.getElementById('panel-footer').innerHTML = `
                <button class="btn btn-outline" style="flex:1" onclick="changeStage(-1)">Back</button>
                <button class="btn btn-outline" style="flex:1; background:var(--blue); border:none;" onclick="changeStage(1)">Next Stage</button>
                <button class="btn btn-primary" style="flex:1" onclick="markDone()">Complete</button>
            `;
            document.getElementById('panel').classList.add('open');
        }

        function changeStage(dir) {
            const index = drivers.findIndex(x => x.id === activeId);
            let n = drivers[index].stage + dir;
            if(n >= 0 && n < STAGES.length) { drivers[index].stage = n; save(); refresh(); openDriverDetail(activeId); }
        }

        function delDriver() { if(confirm("Delete?")) { drivers = drivers.filter(x => x.id !== activeId); save(); closePanel(); refresh(); } }
        function markDone() { const index = drivers.findIndex(x => x.id === activeId); drivers[index].done = true; save(); closePanel(); refresh(); toast("Active!"); }
        function closePanel() { document.getElementById('panel').classList.remove('open'); }

        function sendWA() {
            const d = drivers.find(x => x.id === activeId);
            let num = d.whatsapp.replace(/\s+/g, ''); if(num.startsWith('0')) num = '27' + num.substring(1);
            const msg = encodeURIComponent(STAGES[d.stage].msg.replace("[Name]", d.name) + "\n\nOnboardingHub ZA\n(Waardeer Holdings)");
            window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
        }

        function refresh() {
            document.getElementById('stat-active').innerText = drivers.filter(d => !d.done).length;
            document.getElementById('stat-tasks').innerText = tasks.filter(t => !t.done).length;
            document.getElementById('recent-list').innerHTML = drivers.slice(-5).reverse().map(d => `<div class="task-card" onclick="openDriverDetail(${d.id})"><div style="width:4px; height:30px; border-radius:2px; background:${STAGES[d.stage].color}"></div><b>${d.name}</b></div>`).join('');
            document.getElementById('task-list').innerHTML = tasks.sort((a,b) => a.done - b.done).map(t => `<div class="task-card" style="opacity:${t.done ? '0.5' : '1'}"><div class="task-check ${t.done ? 'done' : ''}" onclick="this.classList.toggle('done'); tasks.find(x=>x.id===${t.id}).done=!tasks.find(x=>x.id===${t.id}).done; save(); refresh();"></div><div style="flex:1; text-decoration:${t.done ? 'line-through' : 'none'}">${t.text}</div><button class="btn btn-danger" style="padding:5px 10px; font-size:0.6rem; width:auto; margin:0;" onclick="tasks=tasks.filter(x=>x.id!==${t.id}); save(); refresh();">Del</button></div>`).join('');
            document.getElementById('pipe-area').innerHTML = STAGES.map((s,i) => `<div class="pipe-col"><div style="color:${s.color}; font-weight:800; margin-bottom:10px;">${s.name}</div>${drivers.filter(d => d.stage === i && !d.done).map(d => `<div class="task-card" style="padding:10px; font-size:0.8rem;" onclick="openDriverDetail(${d.id})">${d.name}</div>`).join('')}</div>`).join('');
            document.getElementById('all-list').innerHTML = drivers.map(d => `<div class="task-card" onclick="openDriverDetail(${d.id})"><b>${d.name}</b> • ${d.done ? '✅ Active' : STAGES[d.stage].name}</div>`).join('');
        }

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js')); }
    </script>
</body>
                </html>
